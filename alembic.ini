# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# set to 'true' to allow modules to be loaded relative to the
# current directory.
prepend_sys_path = .

# version path separator; for Windows/cross-platform compatibility
version_path_separator = os

# placeholder URL, set dynamically by env.py
sqlalchemy.url = sqlite+aiosqlite:///./expense_tracker.db

[post_write_hooks]

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
